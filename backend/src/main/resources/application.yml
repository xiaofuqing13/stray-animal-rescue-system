server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stray_animal_rescue?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}   # 请改为你自己的 MySQL 密码，或通过环境变量 MYSQL_PASSWORD 注入
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  servlet:
    multipart:
      max-file-size: 40MB
      max-request-size: 100MB
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

mybatis-plus:
  # mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.stray.animal.rescue.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true

# 文件上传路径配置
# path: 文件保存到后端独立目录，避免依赖前端 public 目录或运行时 cwd
# url-prefix: 数据库及前端访问用的相对路径前缀（不含 context-path）
file:
  upload:
    path: ./uploads/
    url-prefix: /uploads/

# Knife4j配置
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    enabled: true
  packages-to-scan: com.stray.animal.rescue.controller
  paths-to-match: /**
  group-configs:
    - group: default
      packages-to-scan: com.stray.animal.rescue.controller
      paths-to-match: /**

knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
    enable-version: false
    enable-reload-cache-parameter: false
  basic:
    enable: false 